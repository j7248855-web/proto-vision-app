syntax = "proto3";
package media;

option go_package = "./gen/proto;media_pt";

message VideoChunk {
    bytes data = 1;
    int32 nal_unit_type = 2;
    int64 instruction = 3;
    string camera_id = 4;
    uint32 timestamp = 5;
}
message Status {
    bool status = 1;
}
service MediaStream {
    rpc Stream(stream VideoChunk) returns (Status);
}