syntax = "proto3";
package media;

option go_package = "./gen/proto;media_pt";

message VideoStream {
    int32 camera_id = 1;
    bytes data = 2;
    uint32 timestamp = 3;
    bool is_keyframe = 4;
}
message VideoChunk {
    bytes data = 1;
    int32 nal_unit_type = 2;
    int64 instruction = 3;
    string camera_id = 4;
}
message Status {
    bool status = 1;
}
service MediaStream {
    rpc Stream(stream VideoStream) returns (Status);
}